# Docker Compose — 人类使用说明书
# 启动:  echo 'DEEPSEEK_API_KEY=你的Key' > .env && docker compose up -d --build

services:
  app:
    build: .
    container_name: human-manual
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_BASE=https://api.deepseek.com
      - DB_PATH=/data/human_manual.db
    restart: unless-stopped
